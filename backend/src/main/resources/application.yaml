spring:
  application:
    name: qamcore-backend

  server:
    forward-headers-strategy: framework

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/qamcore}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 20000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: false
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  messages:
    basename: lang/messages
    encoding: 'UTF-8'
  data:
    redis:
      host: redis
      port: 6379

management:
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

token:
  signing:
    key: ${JWT_SECRET:X1Yb5xJv6s9gC7wJ9wY9qZ8MZcQ3RZzP7w8X0rZ0JkHq4E6h2cJ5c0m2E0Qp3s1mQ6QG5Xq9G1yZk2EwA==}
  access:
    duration-ms: ${ACCESS_TOKEN_DURATION:900000}
  refresh:
    duration-ms: ${REFRESH_TOKEN_DURATION:2592000000}
app:
  init:
    admin-password: ${ADMIN_PASSWORD:admin}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
