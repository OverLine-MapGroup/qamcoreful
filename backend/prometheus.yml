global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'qamcore-app'
    static_configs:
      - targets: ['app:8081']
    metrics_path: '/actuator/prometheus'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'qamcore-app'
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']